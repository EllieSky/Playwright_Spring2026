name: Playwright Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to use for tests'
        required: true
        default: 'chromium'
        type: choice
        options:
          - chromium
          - firefox
          - webkit
      mobile:
        description: 'Mobile device emulation'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - iPhone 15
          - iPad (gen 11)
          - iPad (gen 7)

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      BROWSER: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.browser || 'chromium' }}
      MOBILE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mobile != '' && github.event.inputs.mobile || '' }}
      HEADLESS: True
      BASE_URL: ${{ secrets.BASE_URL }}
      VIEWPORT_WIDTH: 1920
      VIEWPORT_HEIGHT: 1080
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps

      - name: Run tests
        run: |
          if [ -z "$MOBILE" ]; then
            pytest -o addopts= -m "not mobile"
          else
            pytest -o addopts= -m "not desktop-only"
          fi

      - name: Publish Test Report
        uses: reporterplus/pytest-html-plus-action@v2
        if: always()
